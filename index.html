<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VLadder</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell public-shell">
      <header class="hero leaderboard-hero">
        <div>
          <h1>VLadder</h1>
          <p class="subtext">Live leaderboard</p>
        </div>
        <a class="admin-link" href="./admin.html">Admin Dashboard</a>
      </header>

      <main class="leaderboard-screen">
        <section class="panel leaderboard-panel leaderboard-panel-fullscreen">
          <div class="leaderboard-head leaderboard-head-compact">
            <div>
              <h2>Leaderboard</h2>
              <p id="last-updated">Waiting for live updates...</p>
            </div>
            <div class="tab-group" role="tablist" aria-label="Leaderboard sorting">
              <button type="button" class="tab is-active" data-sort="bookedAppointments" role="tab" aria-selected="true">Booked Appointments</button>
              <button type="button" class="tab" data-sort="demos" role="tab" aria-selected="false">Demos</button>
              <button type="button" class="tab" data-sort="estimatedRevenue" role="tab" aria-selected="false">Estimated Revenue</button>
            </div>
          </div>
          <p id="leaderboard-status" class="status"></p>
          <div id="leaderboard" class="leaderboard"></div>
        </section>
      </main>

      <button type="button" id="open-submission-modal" class="floating-action-button">Log Booked Appointment</button>

      <div id="submission-modal" class="modal hidden" aria-hidden="true">
        <div id="submission-modal-backdrop" class="modal-backdrop"></div>
        <section class="modal-dialog panel" role="dialog" aria-modal="true" aria-labelledby="submission-modal-title">
          <div class="modal-header">
            <div>
              <h2 id="submission-modal-title">Log a Booked Appointment</h2>
              <p class="subtext">Record the appointment without leaving the live board.</p>
            </div>
            <button type="button" id="close-submission-modal" class="icon-button secondary" aria-label="Close appointment form">Close</button>
          </div>

          <form id="submission-form" class="stack" novalidate>
            <label>
              Select Team Member
              <input id="member-search" list="member-options" placeholder="Type a team member name" autocomplete="off" required />
              <datalist id="member-options"></datalist>
            </label>

            <label>
              Appointment Date
              <input id="appointment-date" type="date" required />
            </label>

            <label>
              Note (optional)
              <textarea id="appointment-note" rows="3" maxlength="300" placeholder="Optional context for admin review"></textarea>
              <small id="note-count" class="hint">0 / 300</small>
            </label>

            <div class="button-row modal-actions">
              <button type="submit">Submit Appointment</button>
              <button type="button" id="cancel-submission-modal" class="secondary">Cancel</button>
            </div>
            <p id="submission-status" class="status"></p>
          </form>
        </section>
      </div>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
