<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The VLadder</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="./config.js"></script>
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div>
          <p class="eyebrow">Live Performance</p>
          <h1>The VLadder</h1>
          <p class="subtext">Track team appointments in real time and climb the board.</p>
        </div>
        <a class="admin-link" href="./admin.html">Admin</a>
      </header>

      <main class="content-grid">
        <section class="panel">
          <h2>Submit Booked Appointments</h2>
          <form id="submission-form" class="stack">
            <label>
              Team Member
              <select id="member-select" required></select>
            </label>
            <label>
              Date
              <input id="appointment-date" type="date" required />
            </label>
            <label>
              Appointments Booked
              <input id="appointments-booked" type="number" min="1" step="1" required />
            </label>
            <button type="submit">Submit Result</button>
            <p id="submission-status" class="status"></p>
          </form>
        </section>

        <section class="panel leaderboard-panel">
          <div class="leaderboard-head">
            <h2>Leaderboard</h2>
            <p id="last-updated">Waiting for live updates…</p>
          </div>
          <div id="leaderboard" class="leaderboard"></div>
        </section>
      </main>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
