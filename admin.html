<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The VLadder Admin | Vault Roofing</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="./config.js"></script>
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div>
          <p class="eyebrow">Vault Roofing</p>
          <h1>Admin Dashboard</h1>
          <p class="subtext">Manage team stats and daily submissions for The VLadder.</p>
        </div>
        <a class="admin-link" href="./index.html">Team Leaderboard</a>
      </header>

      <main class="admin-layout">
        <section id="admin-gate" class="panel">
          <h2>Admin Access</h2>
          <form id="admin-login-form" class="stack" novalidate>
            <label>
              Password
              <input id="admin-password" type="password" autocomplete="current-password" required />
            </label>
            <button type="submit">Unlock Dashboard</button>
            <p id="admin-login-status" class="status"></p>
          </form>
        </section>

        <section id="admin-console" class="admin-console hidden">
          <section class="panel">
            <h2>Team Member Manager</h2>
            <form id="member-form" class="stack" novalidate>
              <label>
                Edit Existing Team Member
                <select id="member-edit-select">
                  <option value="">Create new member</option>
                </select>
              </label>
              <label>
                Team Member Name
                <input id="member-name" type="text" required />
              </label>
              <label>
                Photo / Avatar URL
                <input id="member-photo" type="url" placeholder="https://..." required />
              </label>

              <div class="metric-row">
                <label>
                  Booked Appointments
                  <input id="member-booked" type="number" min="0" step="1" required />
                </label>
                <label>
                  Demos
                  <input id="member-demos" type="number" min="0" step="1" required />
                </label>
                <label>
                  Estimated Revenue
                  <input id="member-revenue" type="number" min="0" step="0.01" required />
                </label>
              </div>

              <label class="switch-row">
                <input id="member-active" type="checkbox" checked />
                Active Team Member
              </label>

              <div class="button-row">
                <button type="submit">Save Team Member</button>
                <button type="button" id="clear-member-form" class="secondary">Clear Form</button>
              </div>
              <p id="member-form-status" class="status"></p>
            </form>
          </section>

          <section class="panel">
            <h2>Daily Submissions</h2>
            <div class="filters">
              <label>
                Filter by Date
                <input id="filter-date" type="date" />
              </label>
              <label>
                Filter by Team Member
                <select id="filter-member">
                  <option value="">All team members</option>
                </select>
              </label>
              <button type="button" id="clear-filters" class="secondary">Clear Filters</button>
            </div>

            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Team Member</th>
                    <th>Date</th>
                    <th>Note</th>
                    <th>Reviewed</th>
                    <th>Submitted</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="submission-table-body"></tbody>
              </table>
            </div>
            <p id="submission-admin-status" class="status"></p>
          </section>
        </section>
      </main>
    </div>

    <script type="module" src="./admin.js"></script>
  </body>
</html>
